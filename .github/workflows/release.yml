name: Release

# Every push builds a signed APK. The build number (versionCode) increments each run.
# If version.properties' versionName already has a stable release, this only refreshes the
# rolling "nightly" prerelease. When versionName is bumped, a new stable release is cut.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Persistent self-hosted Mac mini (has the Android SDK).
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          XFILES_KEYSTORE: ${{ runner.temp }}/release.jks
          XFILES_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          XFILES_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          XFILES_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease -PbuildNumber=${{ github.run_number }} --no-daemon

      - name: Decide release (stable vs rolling prerelease)
        id: decide
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eu
          VERSION=$(sed -n 's/^versionName=//p' version.properties | tr -d '[:space:]')
          BUILD=${{ github.run_number }}
          # Stable release for this versionName already exists? (HTTP 200 vs 404)
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")
          if [ "$CODE" = "200" ]; then
            echo "tag=nightly"                                        >> "$GITHUB_OUTPUT"
            echo "name=XFiles ${VERSION} — nightly (build ${BUILD})"  >> "$GITHUB_OUTPUT"
            echo "prerelease=true"                                    >> "$GITHUB_OUTPUT"
            echo "apk=XFiles-nightly.apk"                             >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${VERSION}"                                    >> "$GITHUB_OUTPUT"
            echo "name=XFiles ${VERSION}"                             >> "$GITHUB_OUTPUT"
            echo "prerelease=false"                                   >> "$GITHUB_OUTPUT"
            echo "apk=XFiles-${VERSION}.apk"                          >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"

      - name: Rename artifact
        run: cp app/build/outputs/apk/release/app-release.apk "${{ steps.decide.outputs.apk }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: ${{ steps.decide.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.decide.outputs.name }}
          prerelease: ${{ steps.decide.outputs.prerelease }}
          body: >-
            XFiles ${{ steps.decide.outputs.version }} · build ${{ steps.decide.outputs.build }}
            (${{ github.sha }}). Offline, open-source file manager — no network, no telemetry.
          files: ${{ steps.decide.outputs.apk }}
