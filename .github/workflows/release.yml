name: Release

# Every push builds a signed APK. The build number (versionCode) increments each run.
# If version.properties' versionName already has a stable release, this only refreshes the
# rolling "nightly" prerelease. When versionName is bumped, a new stable release is cut.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          XFILES_KEYSTORE: ${{ runner.temp }}/release.jks
          XFILES_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          XFILES_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          XFILES_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease -PbuildNumber=${{ github.run_number }} --no-daemon

      - name: Prepare artifact
        id: artifact
        run: |
          VERSION=$(sed -n 's/^versionName=//p' version.properties | tr -d '[:space:]')
          BUILD=${{ github.run_number }}
          SRC=app/build/outputs/apk/release/app-release.apk
          APK="XFiles-${VERSION}-build${BUILD}.apk"
          cp "$SRC" "$APK"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          VERSION: ${{ steps.artifact.outputs.version }}
          BUILD: ${{ steps.artifact.outputs.build }}
          APK: ${{ steps.artifact.outputs.apk }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          STABLE_TAG="v${VERSION}"

          if gh release view "$STABLE_TAG" >/dev/null 2>&1; then
            # versionName already released -> keep refreshing the single rolling prerelease.
            PRE_TAG="nightly"
            NOTES="Rolling build off \`main\`. Version ${VERSION}, build ${BUILD} (${SHA:0:7})."
            if gh release view "$PRE_TAG" >/dev/null 2>&1; then
              # drop old APKs so the prerelease always carries just the latest build
              for a in $(gh release view "$PRE_TAG" --json assets --jq '.assets[].name'); do
                gh release delete-asset "$PRE_TAG" "$a" -y || true
              done
              gh release edit "$PRE_TAG" --prerelease \
                --title "XFiles ${VERSION} — nightly (build ${BUILD})" --notes "$NOTES"
              gh release upload "$PRE_TAG" "$APK" --clobber
            else
              gh release create "$PRE_TAG" --prerelease --target "$SHA" \
                --title "XFiles ${VERSION} — nightly (build ${BUILD})" --notes "$NOTES" "$APK"
            fi
          else
            # new versionName -> cut a stable release.
            gh release create "$STABLE_TAG" --target "$SHA" \
              --title "XFiles ${VERSION}" \
              --notes "XFiles ${VERSION} (build ${BUILD}). Offline, open-source file manager." \
              "$APK"
          fi
